<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Problem Board" />
  <title>Problem Board — The Hangout</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #23232f;
      --border: #2e2e3e;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --cast: #22c55e;
      --cast-hover: #16a34a;
      /* hold-type colours */
      --start: #22c55e;
      --int: #3b82f6;
      --finish: #ef4444;
      --feet: #f59e0b;
      --gold: #fbbf24;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --nav-h: 60px;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── View switching ──────────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; animation: fade 0.18s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    /* ── Top bar (per view) ──────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,19,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .header-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cast);
      box-shadow: 0 0 8px var(--cast);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .search-row { display: flex; gap: 8px; align-items: center; }
    .search-wrap { position: relative; flex: 1; }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 15px;
    }

    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 9px 10px 9px 34px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--text-muted); }

    .count-badge {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      padding: 0 2px;
    }

    /* ── Grade filter tabs ───────────────────────────────────────────── */
    .grade-tabs {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .grade-tabs::-webkit-scrollbar { display: none; }

    .grade-tab {
      flex: 0 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 6px 13px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .grade-tab:active { transform: scale(0.95); }
    .grade-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main content ────────────────────────────────────────────────── */
    main {
      padding: 12px 12px calc(var(--nav-h) + 24px + env(safe-area-inset-bottom));
      max-width: 680px;
      margin: 0 auto;
    }
    main.centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
    }

    /* ── Problem cards (list) ────────────────────────────────────────── */
    .problem-list { display: flex; flex-direction: column; gap: 8px; }

    .problem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .problem-card:active { background: var(--surface2); }

    .problem-info { flex: 1; min-width: 0; }

    .problem-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .problem-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-setter { color: var(--text-muted); }

    /* ── Grade badge ─────────────────────────────────────────────────── */
    .grade-badge {
      display: inline-block;
      background: rgba(108,99,255,0.16);
      border: 1px solid rgba(108,99,255,0.5);
      color: #a5a0ff;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ── Stars ───────────────────────────────────────────────────────── */
    .stars { letter-spacing: 1px; font-size: 13px; line-height: 1; }
    .star-on { color: var(--gold); }
    .star-off { color: #44445a; }

    /* ── Cast button (card) ──────────────────────────────────────────── */
    .cast-btn {
      flex-shrink: 0;
      background: var(--cast);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 15px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      white-space: nowrap;
      letter-spacing: 0.02em;
      touch-action: manipulation;
    }
    .cast-btn:hover { background: var(--cast-hover); }
    .cast-btn:active { transform: scale(0.95); }
    .cast-btn.casting { opacity: 0.6; pointer-events: none; }
    .cast-btn.sent { background: var(--accent); animation: flash 0.4s ease; }

    @keyframes flash {
      0%   { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* ── Detail view ─────────────────────────────────────────────────── */
    .detail-bar { display: flex; align-items: center; gap: 10px; }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px; height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { background: var(--surface2); transform: scale(0.95); }
    .icon-btn svg { width: 20px; height: 20px; }

    .detail-bar-title {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-name {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .bench-badge {
      background: rgba(245,158,11,0.16);
      border: 1px solid rgba(245,158,11,0.5);
      color: var(--gold);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-comment {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.5;
      color: #c8c8da;
      margin-bottom: 18px;
    }

    .action-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-lg {
      width: 100%;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      touch-action: manipulation;
      border: 1px solid transparent;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .btn-lg:active { transform: scale(0.98); }
    .btn-cast { background: var(--cast); color: #fff; }
    .btn-cast:hover { background: var(--cast-hover); }
    .btn-cast.casting { opacity: 0.6; pointer-events: none; }
    .btn-cast.sent { background: var(--accent); }
    .btn-tick {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent-hover);
    }
    .btn-tick:hover { background: rgba(108,99,255,0.12); }

    .detail-section { margin-bottom: 22px; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .section-label .muted { color: #55556a; font-weight: 600; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-start { background: var(--start); }
    .dot-int { background: var(--int); }
    .dot-finish { background: var(--finish); }

    .hold-group { margin-bottom: 14px; }
    .hg-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 7px;
    }
    .hg-label.start { color: #4ade80; }
    .hg-label.int { color: #60a5fa; }
    .hg-label.finish { color: #f87171; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      font-size: 13px;
      font-weight: 600;
      padding: 6px 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      min-width: 42px;
      text-align: center;
    }
    .chip.start  { background: rgba(34,197,94,0.14);  border-color: rgba(34,197,94,0.45);  color: #4ade80; }
    .chip.int    { background: rgba(59,130,246,0.14); border-color: rgba(59,130,246,0.45); color: #60a5fa; }
    .chip.finish { background: rgba(239,68,68,0.14);  border-color: rgba(239,68,68,0.45);  color: #f87171; }
    .chip.feet   { background: rgba(245,158,11,0.14); border-color: rgba(245,158,11,0.45); color: var(--gold); text-transform: capitalize; }

    /* ── Auth + Profile shells ───────────────────────────────────────── */
    .shell-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
    }
    .shell-icon {
      width: 54px; height: 54px;
      border-radius: 14px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .shell-icon svg { width: 26px; height: 26px; color: var(--accent); }
    .shell-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 6px; }
    .shell-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
    .pill {
      display: inline-block;
      background: rgba(108,99,255,0.16);
      border: 1px solid rgba(108,99,255,0.4);
      color: #a5a0ff;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .fld {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 15px;
      padding: 12px;
      margin-bottom: 10px;
      -webkit-appearance: none;
    }
    .fld:disabled { opacity: 0.55; }
    .btn-block {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s, opacity 0.2s, background 0.15s;
    }
    .btn-block:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 10px; }
    .link { color: var(--accent-hover); text-decoration: none; font-weight: 600; }

    /* ── Profile ─────────────────────────────────────────────────────── */
    .profile-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .profile-row .k { color: var(--text-muted); font-size: 14px; }
    .profile-row .v { font-weight: 700; }

    /* ── Bottom nav ──────────────────────────────────────────────────── */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 150;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      background: rgba(20,20,28,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      transition: color 0.15s;
      touch-action: manipulation;
    }
    .nav-item svg { width: 23px; height: 23px; }
    .nav-item.active { color: var(--accent-hover); }
    .nav-item:active { opacity: 0.7; }

    /* ── States ──────────────────────────────────────────────────────── */
    .state-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 15px;
      line-height: 1.6;
    }
    .state-msg .icon { font-size: 36px; margin-bottom: 10px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 60px auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow);
      transition: transform 0.25s cubic-bezier(.175,.885,.32,1.275);
      z-index: 200;
      max-width: 90vw;
      text-align: center;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--cast); color: var(--cast); }
    #toast.error { border-color: #f87171; color: #f87171; }
  </style>
</head>
<body>

<!-- ══ LIST VIEW ══════════════════════════════════════════════════════ -->
<section id="view-list" class="view active">
  <header class="topbar">
    <div class="header-title">
      <span class="dot"></span>
      Problem Board
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="search" placeholder="Search name, setter, grade…" autocomplete="off" />
      </div>
      <span class="count-badge" id="count"></span>
    </div>
    <div class="grade-tabs" id="grade-tabs"></div>
  </header>
  <main>
    <div id="list-container">
      <div class="spinner"></div>
      <p class="state-msg" style="padding-top:8px">Loading problems…</p>
    </div>
  </main>
</section>

<!-- ══ DETAIL VIEW ════════════════════════════════════════════════════ -->
<section id="view-detail" class="view">
  <header class="topbar detail-bar">
    <button class="icon-btn" id="back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="detail-bar-title" id="detail-name">Problem</div>
  </header>
  <main>
    <div id="detail-content"></div>
  </main>
</section>

<!-- ══ AUTH VIEW ══════════════════════════════════════════════════════ -->
<section id="view-auth" class="view">
  <main class="centered">
    <div class="shell-card">
      <div class="shell-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <div class="shell-title">Sign in</div>
      <div class="pill">Coming soon</div>
      <div class="shell-sub">Accounts let you tick problems and track your sends. Browsing and casting work without an account.</div>
      <input class="fld" type="email" placeholder="Email" disabled />
      <input class="fld" type="password" placeholder="Password" disabled />
      <button class="btn-block btn-primary" id="auth-submit" disabled>Sign in</button>
      <button class="btn-block btn-ghost" id="auth-back">Back to problems</button>
    </div>
  </main>
</section>

<!-- ══ PROFILE VIEW ═══════════════════════════════════════════════════ -->
<section id="view-profile" class="view">
  <header class="topbar">
    <div class="header-title">Profile</div>
  </header>
  <main>
    <div class="shell-card" style="margin:8px auto 18px;text-align:center">
      <div class="shell-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <div class="shell-title">Browsing as guest</div>
      <div class="shell-sub">Sign in to tick problems and see your stats here.</div>
      <button class="btn-block btn-primary" id="profile-signin">Sign in</button>
    </div>
    <div class="profile-row"><span class="k">Total ticks</span><span class="v">—</span></div>
    <div class="profile-row"><span class="k">Hardest send</span><span class="v">—</span></div>
  </main>
</section>

<!-- ══ BOTTOM NAV ═════════════════════════════════════════════════════ -->
<nav id="bottom-nav">
  <a href="#list" class="nav-item" data-nav="list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
    <span>Problems</span>
  </a>
  <a href="#profile" class="nav-item" data-nav="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>Profile</span>
  </a>
</nav>

<div id="toast"></div>

<script>
  // ── Supabase client ──────────────────────────────────────────────────────────
  const { createClient } = supabase;
  const sb = createClient(
    'https://uqirowyfqwiceyjznosl.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaXJvd3lmcXdpY2V5anpub3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODMwMzAsImV4cCI6MjA5NDg1OTAzMH0.gOxEeiW9Ej1ol_w2qyAT2wvPGf8N8ECAwuJ4lO6GDpA'
  );

  // ── Realtime channel for casting (unchanged contract: board:HangoutPortland) ──
  const channel = sb.channel('board:HangoutPortland');
  channel.subscribe();

  // ── Grade ordering (French bouldering) ───────────────────────────────────────
  const GRADE_ORDER = ['3','4a','4b','4c','5a','5b','5b+','5c','5c+','6a','6a+','6b','6b+','6c','6c+','7a','7a+','7b','7b+','7c','7c+','8a'];
  // Unknown grades (e.g. "Project") sort to the end.
  const gradeRank = g => { const i = GRADE_ORDER.indexOf(g); return i === -1 ? 999 : i; };

  // ── State ────────────────────────────────────────────────────────────────────
  let allProblems = [];
  let activeGrade = 'all';
  let searchQuery = '';
  let loaded = false;
  let currentView = 'list';
  let listScroll = 0;

  // ── Escape helpers ───────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── Toast helper ─────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 2800);
  }

  // ── Small render helpers ─────────────────────────────────────────────────────
  function starsHtml(n) {
    n = Math.max(0, Math.min(3, Number(n) || 0));
    let out = '';
    for (let i = 0; i < 3; i++) {
      out += i < n ? '<span class="star-on">★</span>' : '<span class="star-off">☆</span>';
    }
    return `<span class="stars" title="${n} star${n !== 1 ? 's' : ''}">${out}</span>`;
  }

  // Display a hold id compactly: "hold235" -> "235", otherwise raw.
  function holdNum(id) {
    const m = /^hold(\d+)$/i.exec(String(id));
    return m ? m[1] : String(id);
  }

  function holdChips(arr, cls) {
    if (!Array.isArray(arr)) arr = (arr === null || arr === undefined) ? [] : [arr];
    return arr.map(h => `<span class="chip ${cls}" title="${escAttr(h)}">${escHtml(holdNum(h))}</span>`).join('');
  }

  // ── Routing ──────────────────────────────────────────────────────────────────
  function parseHash() {
    const raw = location.hash.replace(/^#/, '') || 'list';
    const idx = raw.indexOf('/');
    if (idx === -1) return { route: raw, param: '' };
    return { route: raw.slice(0, idx), param: decodeURIComponent(raw.slice(idx + 1)) };
  }

  function setView(name) {
    // Preserve the list's scroll position across navigation.
    if (currentView === 'list' && name !== 'list') listScroll = window.scrollY;

    ['list','detail','auth','profile'].forEach(v => {
      document.getElementById('view-' + v).classList.toggle('active', v === name);
    });

    // Bottom nav: hidden on the focused auth screen.
    document.getElementById('bottom-nav').style.display = name === 'auth' ? 'none' : 'flex';

    // Active nav highlight.
    const navFor = { list: 'list', detail: 'list', profile: 'profile', auth: 'profile' }[name] || 'list';
    document.querySelectorAll('.nav-item').forEach(a => a.classList.toggle('active', a.dataset.nav === navFor));

    if (name === 'list') window.scrollTo(0, listScroll);
    else window.scrollTo(0, 0);

    currentView = name;
  }

  function router() {
    const { route, param } = parseHash();
    switch (route) {
      case 'detail':  renderDetail(param); setView('detail'); break;
      case 'auth':    setView('auth'); break;
      case 'profile': setView('profile'); break;
      case 'list':
      default:        setView('list'); break;
    }
  }

  function goBack() {
    if (history.length > 1) history.back();
    else location.hash = '#list';
  }

  // ── List: filter + sort ──────────────────────────────────────────────────────
  function visibleProblems() {
    let arr = allProblems;
    if (activeGrade !== 'all') arr = arr.filter(p => p.grade === activeGrade);
    if (searchQuery) {
      const q = searchQuery;
      arr = arr.filter(p =>
        String(p.name || '').toLowerCase().includes(q) ||
        String(p.setter || '').toLowerCase().includes(q) ||
        String(p.grade || '').toLowerCase().includes(q)
      );
    }
    return arr.slice().sort((a, b) =>
      gradeRank(a.grade) - gradeRank(b.grade) ||
      String(a.name || '').localeCompare(String(b.name || ''))
    );
  }

  function cardHtml(p) {
    return `
      <div class="problem-card" data-id="${escAttr(p.id)}">
        <div class="problem-info">
          <div class="problem-name">${escHtml(p.name || '(unnamed)')}</div>
          <div class="problem-meta">
            <span class="grade-badge">${escHtml(p.grade || '—')}</span>
            <span class="meta-setter">${escHtml(p.setter || '—')}</span>
            ${starsHtml(p.stars)}
          </div>
        </div>
        <button class="cast-btn" data-name="${escAttr(p.name || '')}">Cast ▶</button>
      </div>`;
  }

  function renderList() {
    const container = document.getElementById('list-container');
    const list = visibleProblems();
    document.getElementById('count').textContent = `${list.length} problem${list.length !== 1 ? 's' : ''}`;

    if (list.length === 0) {
      container.innerHTML = `<div class="state-msg"><div class="icon">🔎</div>No problems match.</div>`;
      return;
    }
    container.innerHTML = `<div class="problem-list">${list.map(cardHtml).join('')}</div>`;
  }

  function buildGradeTabs() {
    const present = [...new Set(allProblems.map(p => p.grade).filter(Boolean))]
      .sort((a, b) => gradeRank(a) - gradeRank(b) || a.localeCompare(b));
    const tabs = ['all', ...present];
    document.getElementById('grade-tabs').innerHTML = tabs.map(g =>
      `<button class="grade-tab${g === activeGrade ? ' active' : ''}" data-grade="${escAttr(g)}">${g === 'all' ? 'All' : escHtml(g)}</button>`
    ).join('');
  }

  // ── Detail ───────────────────────────────────────────────────────────────────
  function renderDetail(id) {
    const wrap = document.getElementById('detail-content');
    const titleEl = document.getElementById('detail-name');

    if (!loaded) {
      titleEl.textContent = 'Loading…';
      wrap.innerHTML = `<div class="spinner"></div>`;
      return;
    }

    const p = allProblems.find(x => String(x.id) === String(id));
    if (!p) {
      titleEl.textContent = 'Not found';
      wrap.innerHTML = `<div class="state-msg"><div class="icon">🤷</div>That problem couldn't be found.<br><a class="link" href="#list">Back to problems</a></div>`;
      return;
    }

    titleEl.textContent = p.name || '(unnamed)';

    const start = Array.isArray(p.start_holds) ? p.start_holds : [];
    const inter = Array.isArray(p.intermediate_holds) ? p.intermediate_holds : [];
    const finish = p.finish_hold ? [p.finish_hold] : [];
    const holdCount = start.length + inter.length + finish.length;

    const comment = String(p.comment || '').trim();
    const showComment = comment && !/^no comments?\.?$/i.test(comment);

    wrap.innerHTML = `
      <h1 class="detail-name">${escHtml(p.name || '(unnamed)')}</h1>
      <div class="detail-meta">
        <span class="grade-badge">${escHtml(p.grade || '—')}</span>
        <span class="meta-setter">by ${escHtml(p.setter || 'unknown')}</span>
        ${starsHtml(p.stars)}
        ${p.is_benchmark ? `<span class="bench-badge">★ Benchmark</span>` : ''}
      </div>

      ${showComment ? `<p class="detail-comment">${escHtml(comment)}</p>` : ''}

      <div class="action-row">
        <button class="btn-lg btn-cast" id="detail-cast" data-name="${escAttr(p.name || '')}">📡 Cast to board</button>
        <button class="btn-lg btn-tick" id="detail-tick">✓ Tick</button>
      </div>

      <div class="detail-section">
        <div class="section-label">Feet</div>
        <div class="chip-row"><span class="chip feet">${escHtml(p.feet_mode || 'any')}</span></div>
      </div>

      <div class="detail-section">
        <div class="section-label">Holds <span class="muted">· ${holdCount}</span></div>
        <div class="legend">
          <span><i class="dot-start"></i>Start</span>
          <span><i class="dot-int"></i>Intermediate</span>
          <span><i class="dot-finish"></i>Finish</span>
        </div>
        ${start.length ? `<div class="hold-group"><span class="hg-label start">Start</span><div class="chip-row">${holdChips(start, 'start')}</div></div>` : ''}
        ${inter.length ? `<div class="hold-group"><span class="hg-label int">Intermediate</span><div class="chip-row">${holdChips(inter, 'int')}</div></div>` : ''}
        ${finish.length ? `<div class="hold-group"><span class="hg-label finish">Finish</span><div class="chip-row">${holdChips(finish, 'finish')}</div></div>` : ''}
      </div>
    `;

    document.getElementById('detail-cast').addEventListener('click', e => castByName(p.name, e.currentTarget));
    document.getElementById('detail-tick').addEventListener('click', () => {
      showToast('Sign in to track ticks — coming soon', 'success');
      location.hash = '#auth';
    });
  }

  // ── Cast a problem (broadcast contract unchanged) ─────────────────────────────
  async function castByName(name, btn) {
    if (!name) return;
    const prev = btn.innerHTML;
    btn.classList.add('casting');
    btn.disabled = true;
    btn.innerHTML = '…';

    try {
      await channel.send({
        type: 'broadcast',
        event: 'cast_problem',
        payload: { problem_name: name }
      });
      btn.classList.remove('casting');
      btn.classList.add('sent');
      btn.innerHTML = '✓ Sent';
      showToast(`Cast: ${name}`, 'success');
      setTimeout(() => {
        btn.innerHTML = prev;
        btn.classList.remove('sent');
        btn.disabled = false;
      }, 2000);
    } catch (err) {
      btn.classList.remove('casting');
      btn.disabled = false;
      btn.innerHTML = prev;
      showToast('Cast failed — check connection', 'error');
      console.error(err);
    }
  }

  // ── Load problems ─────────────────────────────────────────────────────────────
  async function loadProblems() {
    const { data, error } = await sb.from('problems').select('*');

    if (error) {
      document.getElementById('list-container').innerHTML =
        `<div class="state-msg"><div class="icon">⚠️</div>Failed to load problems.<br><small style="opacity:.6">${escHtml(error.message)}</small></div>`;
      document.getElementById('count').textContent = '';
      return;
    }

    allProblems = data || [];
    loaded = true;
    buildGradeTabs();
    renderList();
    // Re-run the router in case we booted straight into #detail/<id>.
    router();
  }

  // ── Wire up events ────────────────────────────────────────────────────────────
  // Search
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderList();
  });

  // Grade tabs (delegated)
  document.getElementById('grade-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.grade-tab');
    if (!tab) return;
    activeGrade = tab.dataset.grade;
    document.querySelectorAll('.grade-tab').forEach(x => x.classList.toggle('active', x === tab));
    renderList();
  });

  // List clicks: cast button vs. open detail (delegated)
  document.getElementById('list-container').addEventListener('click', e => {
    const cast = e.target.closest('.cast-btn');
    if (cast) { e.stopPropagation(); castByName(cast.dataset.name, cast); return; }
    const card = e.target.closest('.problem-card');
    if (card) location.hash = '#detail/' + encodeURIComponent(card.dataset.id);
  });

  // Detail back
  document.getElementById('back-btn').addEventListener('click', goBack);

  // Auth / profile shell actions
  document.getElementById('auth-back').addEventListener('click', () => { location.hash = '#list'; });
  document.getElementById('profile-signin').addEventListener('click', () => { location.hash = '#auth'; });

  // ── Boot ──────────────────────────────────────────────────────────────────────
  window.addEventListener('hashchange', router);
  router();        // show initial view (list shows its loading spinner)
  loadProblems();  // fetch, then render + re-route
</script>
</body>
</html>
